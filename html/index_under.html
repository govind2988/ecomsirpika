<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Website Under Construction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .fade-in {
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="relative min-h-screen flex items-center justify-center overflow-hidden">

    <!-- Background Image -->
    <div class="absolute inset-0">
        <!-- Replace the URL with your image -->
        <img src="assets/images/bg.png"
             class="w-full h-full object-cover" alt="Background">
    </div>

    <!-- Gradient + Dark Overlay -->
    <div class="absolute inset-0 
                from-orange-500 via-amber-400 to-yellow-300
                bg-gradient-to-br
                opacity-30">
    </div>

    <!-- Content -->
    <div class="relative z-10 text-center text-gray-900 px-6 fade-in">

        <!-- Logo -->
        <div class="mb-6">
            <img src="assets/images/logo.svg" alt="Logo" class="mx-auto w-32 md:w-48 bg-white rounded-lg px-4 py-2 shadow-lg">
        </div>

        <!-- Heading -->
        <h1 class="text-3xl md:text-5xl font-bold mb-4 drop-shadow-xl">
          Website Under Construction
        </h1>

        <!-- Subtext -->
        <p class="text-lg md:text-xl font-bold mb-6 opacity-95">
            We're working hard to launch our new website.
        </p>

        <!-- Contact Box -->
        <div class="bg-white/20 dark:bg-black/40 backdrop-blur-md rounded-xl px-6 py-4 inline-block shadow-2xl">
            <p class="text-lg md:text-xl font-semibold text-white">
                Contact us for orders
            </p>
            <a href="tel:6381451509"
               class="block text-2xl md:text-3xl font-bold mt-2 hover:underline text-white">
              +91 63814 51509
            </a>
        </div>

    </div>

</body>
</html>
